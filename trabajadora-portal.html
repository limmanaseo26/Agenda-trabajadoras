<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0d3b52" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LÍMMAN" />
  <title>LÍMMAN | Portal Trabajadora</title>
  <script>
    (function () {
      if (location.protocol === 'http:' || location.protocol === 'https:') {
        var l = document.createElement('link');
        l.rel = 'manifest';
        l.href = 'manifest.json';
        document.head.appendChild(l);
      }
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #eef1f5;
      --white:     #ffffff;
      --card-shadow: 0 4px 32px rgba(13,59,82,0.10);
      --navy:      #0d3b52;
      --navy2:     #1a5c7a;
      --accent:    #2a9d8f;
      --btn-from:  #1a4a7a;
      --btn-to:    #5b4fcf;
      --input-bg:  #eaf0f6;
      --border:    #d4dde6;
      --muted:     #6b8a9a;
      --text:      #0d3b52;
      --green:     #2a9d5c;
      --amber:     #e09f3e;
      --red:       #d64040;
      --radius:    18px;
      --radius-sm: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: var(--bg);
      color: var(--text); font-family: 'Nunito', sans-serif;
      overflow-x: hidden;
    }

    /* ── VIEWS ── */
    .view { display: none; min-height: 100vh; flex-direction: column; }
    .view.active { display: flex; }

    /* ══════════════════════════════
       LOGIN
    ══════════════════════════════ */
    #view-login {
      align-items: center; justify-content: center;
      padding: 32px 20px; background: var(--bg);
      min-height: 100vh;
    }
    .login-wrap {
      background: var(--white); border-radius: 24px;
      box-shadow: var(--card-shadow);
      padding: 40px 32px 36px;
      width: 100%; max-width: 420px;
    }
    .login-logo {
      display: flex; justify-content: center; margin-bottom: 24px;
    }
    .login-logo img { height: 64px; object-fit: contain; }
    .login-title {
      text-align: center; font-size: 1.75rem; font-weight: 800;
      color: var(--navy); margin-bottom: 8px;
    }
    .login-sub {
      text-align: center; font-size: 0.88rem; color: var(--muted);
      line-height: 1.6; margin-bottom: 28px;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 0.82rem; font-weight: 600;
      color: var(--navy2); margin-bottom: 7px;
    }
    .field input {
      width: 100%; background: var(--input-bg);
      border: 1.5px solid transparent; border-radius: var(--radius-sm);
      padding: 13px 16px; color: var(--text);
      font-size: 0.95rem; font-family: 'Nunito', sans-serif;
      outline: none; transition: border-color .2s, background .2s;
    }
    .field input:focus {
      border-color: var(--accent); background: #fff;
    }
    .login-error {
      background: #fef2f2; border: 1px solid #fca5a5;
      color: var(--red); border-radius: var(--radius-sm);
      padding: 10px 14px; font-size: 0.82rem;
      margin-bottom: 14px; display: none; font-weight: 600;
    }
    .login-error.show { display: block; }
    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(90deg, var(--btn-from), var(--btn-to));
      color: #fff; border: none; border-radius: var(--radius-sm);
      font-size: 1rem; font-weight: 700; cursor: pointer;
      font-family: 'Nunito', sans-serif;
      transition: filter .2s; letter-spacing: .02em;
    }
    .btn-login:hover { filter: brightness(1.1); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; filter: none; }
    .login-footer {
      text-align: center; font-size: 0.75rem;
      color: var(--muted); margin-top: 20px; line-height: 1.6;
    }

    /* ══════════════════════════════
       APP SHELL
    ══════════════════════════════ */
    #view-app { background: var(--bg); }

    .topbar {
      background: var(--white);
      box-shadow: 0 2px 12px rgba(13,59,82,0.07);
      padding: 16px 20px 14px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-logo { height: 32px; object-fit: contain; }
    .topbar-divider {
      width: 1px; height: 28px; background: var(--border);
    }
    .topbar-name  { font-size: 0.95rem; font-weight: 700; color: var(--navy); }
    .topbar-date  { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
    .logout-btn {
      background: var(--input-bg); border: 1.5px solid var(--border);
      color: var(--muted); border-radius: 50px; padding: 7px 16px;
      font-size: 0.75rem; font-weight: 600; cursor: pointer;
      font-family: 'Nunito', sans-serif; transition: all .2s;
      position: relative; z-index: 2; pointer-events: auto;
    }
    .logout-btn:hover { color: var(--red); border-color: var(--red); background: #fef2f2; }

    /* TABS */
    .tabs {
      display: flex; gap: 6px; padding: 16px 20px 8px;
      overflow-x: auto; scrollbar-width: none; background: var(--bg);
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 8px 20px; border-radius: 50px;
      border: 1.5px solid var(--border); background: var(--white);
      color: var(--muted); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: all .2s; font-family: 'Nunito', sans-serif;
    }
    .tab.active {
      background: linear-gradient(90deg, var(--btn-from), var(--btn-to));
      color: #fff; border-color: transparent;
    }
    .fijo-hint {
      font-size: 0.78rem; color: var(--muted); padding: 0 20px 10px;
      font-weight: 600; line-height: 1.4;
    }

    /* SCROLL */
    .scroll-area { flex: 1; overflow-y: auto; padding: 12px 16px 100px; }

    /* CARDS */
    .card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: 0 2px 12px rgba(13,59,82,0.07);
      padding: 18px; margin-bottom: 12px;
      border: 1.5px solid transparent;
      transition: box-shadow .2s, border-color .2s;
    }
    .card:hover { box-shadow: var(--card-shadow); border-color: var(--border); }

    /* SERVICE CARD */
    .svc-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 10px;
    }
    .svc-time { font-size: 1.6rem; font-weight: 800; color: var(--navy); line-height: 1; }
    .svc-date { font-size: 0.72rem; color: var(--muted); margin-top: 3px; font-weight: 600; }

    .badge {
      font-size: 0.7rem; padding: 4px 12px; border-radius: 50px;
      font-weight: 700; letter-spacing: .03em;
    }
    .badge-pending  { background: #fef9ec; color: #b45309; border: 1.5px solid #fcd34d; }
    .badge-confirmed{ background: #f0fdf4; color: #166534; border: 1.5px solid #86efac; }
    .badge-ongoing  { background: #eff6ff; color: #1e40af; border: 1.5px solid #93c5fd; }
    .badge-done     { background: #f8fafc; color: var(--muted); border: 1.5px solid var(--border); }

    .svc-client { font-size: 1rem; font-weight: 700; color: var(--navy); margin-bottom: 3px; }
    .svc-plan   { font-size: 0.8rem; color: var(--muted); margin-bottom: 12px; font-weight: 600; }
    .svc-prog   { font-size: 0.82rem; color: var(--navy); margin-bottom: 10px; font-weight: 600; }
    .svc-cliente-meta { font-size: 0.76rem; color: var(--muted); margin-bottom: 8px; line-height: 1.35; font-weight: 600; }

    .svc-addr {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.82rem; color: var(--navy2);
      background: var(--input-bg); border-radius: 10px;
      padding: 10px 12px; margin-bottom: 12px;
      cursor: pointer; transition: background .2s;
      border: 1.5px solid var(--border);
      text-decoration: none;
    }
    .svc-addr:hover { background: #dceefb; border-color: var(--accent); }
    .svc-addr svg   { flex-shrink: 0; color: var(--accent); }
    .svc-addr span  { flex: 1; font-weight: 600; }
    .maps-label     { font-size: 0.7rem; color: var(--accent); font-weight: 700; }

    /* TIMESTAMPS */
    .timestamps { display: flex; gap: 8px; margin-bottom: 12px; }
    .ts-chip {
      flex: 1; background: var(--input-bg); border-radius: 10px;
      padding: 9px 12px; border: 1.5px solid var(--border);
    }
    .ts-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; font-weight: 700; }
    .ts-value { font-size: 0.9rem; font-weight: 700; margin-top: 2px; color: var(--navy); }

    /* BUTTONS */
    .svc-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      flex: 1; min-width: 110px; padding: 11px 14px; border-radius: 10px;
      border: none; font-size: 0.82rem; font-weight: 700; cursor: pointer;
      font-family: 'Nunito', sans-serif; transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-primary {
      background: linear-gradient(90deg, var(--btn-from), var(--btn-to));
      color: #fff;
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-green  { background: #f0fdf4; color: #166534; border: 1.5px solid #86efac; }
    .btn-green:hover  { background: #dcfce7; }
    .btn-red    { background: #fef2f2; color: var(--red); border: 1.5px solid #fca5a5; }
    .btn-red:hover    { background: #fee2e2; }
    .btn-ghost  { background: var(--input-bg); color: var(--muted); border: 1.5px solid var(--border); }
    .btn-ghost:hover  { color: var(--navy); border-color: var(--navy2); background: #fff; }
    .btn:disabled     { opacity: .45; cursor: not-allowed; filter: none; }
    .btn-full         { width: 100%; min-width: unset; }

    /* SECTION TITLE */
    .section-title {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: .1em;
      color: var(--muted); margin: 20px 0 10px; font-weight: 700;
    }

    /* EMPTY STATE */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: .5; }
    .empty-text { font-size: 0.9rem; line-height: 1.6; font-weight: 600; }

    /* MODULES */
    .modules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .module-card {
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 22px 16px;
      text-align: center; cursor: pointer; transition: all .2s;
      box-shadow: 0 2px 8px rgba(13,59,82,0.05);
    }
    .module-card.active-mod:hover {
      border-color: var(--accent); box-shadow: 0 4px 20px rgba(42,157,143,0.15);
      transform: translateY(-2px);
    }
    .module-card.coming { opacity: .5; cursor: default; }
    .mod-icon  { font-size: 1.9rem; margin-bottom: 8px; }
    .mod-label { font-size: 0.85rem; font-weight: 700; color: var(--navy); }
    .mod-sub   { font-size: 0.72rem; color: var(--muted); margin-top: 3px; font-weight: 600; }
    .mod-pill  {
      display: inline-block; font-size: 0.62rem; padding: 2px 10px;
      border-radius: 50px; margin-top: 8px;
      background: var(--input-bg); color: var(--muted);
      border: 1.5px solid var(--border); font-weight: 700;
    }

    /* PROFILE */
    .profile-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--card-shadow); padding: 28px 20px; margin-bottom: 16px; text-align: center;
    }
    .avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, var(--btn-from), var(--btn-to));
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 800; margin: 0 auto 12px; color: #fff;
      box-shadow: 0 4px 20px rgba(91,79,207,0.3);
    }
    .profile-name  { font-size: 1.3rem; font-weight: 800; color: var(--navy); }
    .profile-email { font-size: 0.8rem; color: var(--muted); margin-top: 4px; font-weight: 600; }
    .stats-row     { display: flex; gap: 10px; margin-top: 20px; }
    .stat-box {
      flex: 1; background: var(--input-bg); border-radius: 12px;
      padding: 14px; border: 1.5px solid var(--border); text-align: center;
    }
    .stat-num { font-size: 1.6rem; font-weight: 800; }
    .stat-lbl { font-size: 0.7rem; color: var(--muted); margin-top: 2px; font-weight: 700; }

    /* CONFIRM BANNER */
    .confirm-banner {
      background: #fffbeb; border: 1.5px solid #fcd34d;
      border-radius: 14px; padding: 14px 16px;
      display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
    }
    .confirm-banner-icon { font-size: 1.4rem; flex-shrink: 0; }
    .confirm-banner-text { flex: 1; font-size: 0.82rem; line-height: 1.5; font-weight: 600; color: #92400e; }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--white);
      border-top: 1.5px solid var(--border);
      box-shadow: 0 -4px 20px rgba(13,59,82,0.08);
      display: flex; padding: 8px 0 env(safe-area-inset-bottom);
      z-index: 50;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 4px; padding: 8px 4px;
      cursor: pointer; color: var(--muted); font-size: 0.65rem;
      font-weight: 700; transition: color .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-item svg { width: 22px; height: 22px; }
    .nav-item.active { color: var(--navy); }
    .nav-item.active svg { stroke: url(#navGrad); }

    /* TOAST */
    #toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--navy); color: #fff;
      padding: 12px 22px; border-radius: 50px; font-size: 0.83rem;
      font-weight: 700; z-index: 999; white-space: nowrap;
      opacity: 0; transition: all .3s; pointer-events: none;
      box-shadow: 0 4px 20px rgba(13,59,82,0.25);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(13,59,82,0.35);
      z-index: 100; display: none; align-items: flex-end; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.show { display: flex; }
    .modal-sheet {
      background: var(--white); border-radius: 24px 24px 0 0;
      padding: 28px 24px 40px; width: 100%; max-width: 480px;
      animation: slideUp .3s ease;
      box-shadow: 0 -8px 40px rgba(13,59,82,0.15);
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle {
      width: 40px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 0 auto 20px;
    }
    .modal-title { font-size: 1.2rem; font-weight: 800; color: var(--navy); margin-bottom: 6px; }
    .modal-sub   { font-size: 0.83rem; color: var(--muted); margin-bottom: 20px; font-weight: 600; }

    /* SPINNER */
    .spinner {
      width: 20px; height: 20px; border: 2.5px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* GPS */
    .gps-ok   { color: var(--green); font-size: 0.78rem; display: flex; align-items: center; gap: 6px; font-weight: 700; }
    .gps-fail { color: var(--red);   font-size: 0.78rem; display: flex; align-items: center; gap: 6px; font-weight: 700; }
    .gps-dot  { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
  </style>
</head>

<!-- SVG gradient for nav icons -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="navGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a4a7a"/>
      <stop offset="100%" stop-color="#5b4fcf"/>
    </linearGradient>
  </defs>
</svg>

<div id="view-boot" class="view active" style="align-items:center;justify-content:center;background:var(--bg)">
  <div style="text-align:center;color:var(--muted);font-weight:700;font-size:0.95rem">

<script>
/* ─────────────────────────────────────────────────
   ⚙️  CONFIGURACIÓN — Proyecto Supabase LÍMMAN
───────────────────────────────────────────────── */
const SUPABASE_URL = 'https://lbeuwbyltygpdaiitcun.supabase.co';
const SUPABASE_KEY = 'sb_publishable_7EV-x2dE-s5Duwc3Fy1-qQ_ZjKhs42M';

// Nombres de tablas (esquema real en Supabase)
const T_TRABAJADORAS = 'trabajadoras';
const T_SERVICIOS    = 'servicios';
const T_CLIENTES       = 'clientes';
const T_REGISTRO_HORAS = 'registro_horas';

/* Modo despliegue: RLS desactivado en Supabase. El aislamiento es solo en este cliente:
   - Resolver la fila en trabajadoras por email de sesión (initApp).
   - Toda lectura/escritura sobre datos de trabajadora debe filtrar por workerIdSesion()
     (columna C_TRABAJADORA_ID en servicios). No añadir consultas sin ese filtro. */

// Columnas servicios (tras normalizarServicio: fecha_hora, nombre_cliente, cliente_*, hora_prog_*, plan_display, confirmada_portal)
// client_id → FK public.clientes (nombre en clientes.name, etc.)
const C_CLIENT_ID      = 'client_id';
const C_FECHA          = 'fecha_hora';
const C_TRABAJADORA_ID = 'worker_id';
const C_DIRECCION      = 'direccion';
const C_NOMBRE_CLI     = 'nombre_cliente';
const C_PLAN           = 'plan_display';
const C_CONFIRMADA     = 'confirmada_portal';
const C_STATUS         = 'status';
/* timestamptz en Supabase: fecha + hora en un solo campo (ISO con toISOString()). */
const C_REP_INICIO     = 'fecha_hora_reporte_inicio';
const C_REP_FIN        = 'fecha_hora_reporte_finalizacion';

// Columnas trabajadoras
const C_TRAB_ID      = 'id';
const C_TRAB_NOMBRE  = 'name';
const C_TRAB_EMAIL   = 'email';
/** 'Fijo' | 'Puesto fijo' | 'Rotativo' | … — cliente base y registro_horas para puesto fijo. */
const C_TRAB_TIPO    = 'tipo';

/** Select PostgREST: servicios + cliente vinculado por client_id (requiere lectura RLS en clientes). */
const SELECT_SERVICIOS_CLIENTE = '*,clientes(id,name,type,segment,phone,email,estado,nit)';

/** id de trabajadoras vinculado al correo con el que inició sesión (único origen para filtrar servicios). */
function workerIdSesion() {
  return trabajadoraRow ? trabajadoraRow[C_TRAB_ID] : null;
}

/** Cliente cuyo worker_id es esta trabajadora (contrato fijo). Requiere SELECT en clientes (RLS). */
async function loadClienteBase() {
  clienteBaseId = null;
  horasClienteBase = null;
  if (!trabajadoraRow) return;
  var wid = workerIdSesion();
  if (wid == null) return;
  var w = coercerIdServicio(wid);
  var r = await db.from(T_CLIENTES).select('id,horas_semanales_contratadas').eq('worker_id', w).order('id', { ascending: true }).limit(1);
  if (r.error || !r.data || !r.data.length) return;
  clienteBaseId = r.data[0].id;
  horasClienteBase = r.data[0].horas_semanales_contratadas;
}

function esTrabajadoraFija() {
  if (!trabajadoraRow) return false;
  var t = trabajadoraRow[C_TRAB_TIPO];
  if (t == null || t === '') return false;
  var n = String(t).trim().toLowerCase();
  return n === 'fijo' || n === 'fija' || n === 'puesto fijo';
}

/** Misma condición: puesto fijo / fija → registro_horas en entrada y salida. */
function esPuestoFijo() {
  return esTrabajadoraFija();
}

/** fechaStr YYYY-MM-DD; mediodía local evita desfases TZ. 40 h → lun–vie; 44 h → lun–sáb. */
function diaLaboralValidoParaHoras(fechaStr, horas) {
  if (!fechaStr) return false;
  var h = horas == null ? NaN : Number(horas);
  if (h === 40) {
    var d = new Date(fechaStr + 'T12:00:00');
    var dow = d.getDay();
    return dow >= 1 && dow <= 5;
  }
  if (h === 44) {
    var d2 = new Date(fechaStr + 'T12:00:00');
    var dow2 = d2.getDay();
    return dow2 >= 1 && dow2 <= 6;
  }
  return true;
}

/** Oculta en agenda los servicios del cliente base fuera de su calendario laboral (40 o 44 h). */
function aplicarReglaFijoBase(servicios) {
  if (!esTrabajadoraFija() || clienteBaseId == null) return servicios;
  var h = horasClienteBase == null ? NaN : Number(horasClienteBase);
  if (h !== 40 && h !== 44) return servicios;
  var bid = coercerIdServicio(clienteBaseId);
  return servicios.filter(function (s) {
    var cid = s.client_id == null ? null : coercerIdServicio(s.client_id);
    if (cid !== bid) return true;
    return diaLaboralValidoParaHoras(s.date, h);
  });
}

/** Enteros para .eq en PostgREST (evita 0 filas por int vs string). */
function coercerIdServicio(id) {
  if (id === null || id === undefined) return id;
  var s = String(id);
  return /^\d+$/.test(s) ? parseInt(s, 10) : id;
}

/** UPDATE en servicios siempre acotado a esta trabajadora (id + worker_id). .select('*') devuelve la fila ya persistida en Supabase (incl. status). */
function serviciosPatchOwn(wid, servicioId, updates) {
  var sid = coercerIdServicio(servicioId);
  var w = coercerIdServicio(wid);
  return db.from(T_SERVICIOS).update(updates).eq('id', sid).eq(C_TRABAJADORA_ID, w).select('*');
}

/** YYYY-MM-DD desde fila servicio (columna date). */
function fechaServicioStr(svc) {
  if (!svc || svc.date == null) return null;
  var d = String(svc.date).trim();
  return d.length >= 10 ? d.substring(0, 10) : d;
}

/** Hora local HH:MM:SS para columnas time en registro_horas. */
function horaLocalHHMMSS(ahora) {
  var d = ahora instanceof Date ? ahora : new Date(ahora);
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0') + ':' + String(d.getSeconds()).padStart(2, '0');
}

function horasLaboradasEntreStrings(horaEnt, horaSal) {
  if (horaEnt == null || horaSal == null || horaEnt === '' || horaSal === '') return null;
  function seg(t) {
    var p = String(t).trim().split(':');
    var h = parseInt(p[0], 10) || 0;
    var m = parseInt(p[1], 10) || 0;
    var s = parseInt(p[2], 10) || 0;
    return h * 3600 + m * 60 + s;
  }
  var a = seg(horaEnt);
  var b = seg(horaSal);
  var diff = b - a;
  if (diff < 0) diff += 24 * 3600;
  return Math.round((diff / 3600) * 100) / 100;
}

/** Puesto fijo: una fila por worker_id + fecha. */
async function upsertRegistroHorasEntrada(wid, fechaStr, horaEntradaStr) {
  var w = coercerIdServicio(wid);
  var q = await db.from(T_REGISTRO_HORAS).select('id').eq('worker_id', w).eq('fecha', fechaStr).limit(1);
  if (q.error) return q;
  if (q.data && q.data.length) {
    return await db.from(T_REGISTRO_HORAS).update({ hora_entrada: horaEntradaStr }).eq('id', q.data[0].id).select();
  }
  return await db.from(T_REGISTRO_HORAS).insert({ worker_id: w, fecha: fechaStr, hora_entrada: horaEntradaStr }).select();
}

async function upsertRegistroHorasSalida(wid, fechaStr, horaSalidaStr) {
  var w = coercerIdServicio(wid);
  var q = await db.from(T_REGISTRO_HORAS).select('id,hora_entrada').eq('worker_id', w).eq('fecha', fechaStr).limit(1);
  if (q.error) return q;
  var horasLab = null;
  if (q.data && q.data.length && q.data[0].hora_entrada)
    horasLab = horasLaboradasEntreStrings(q.data[0].hora_entrada, horaSalidaStr);
  if (q.data && q.data.length) {
    return await db.from(T_REGISTRO_HORAS).update({ hora_salida: horaSalidaStr, horas_laboradas: horasLab }).eq('id', q.data[0].id).select();
  }
  return await db.from(T_REGISTRO_HORAS).insert({ worker_id: w, fecha: fechaStr, hora_salida: horaSalidaStr, horas_laboradas: horasLab }).select();
}

/**
 * Escribe registro_horas para puesto fijo antes de actualizar servicios.
 * Si falla, no se llama a servicios (el registro oficial es registro_horas).
 */
async function registrarHorasPuestoFijoEntrada(wid, svc, ahoraDate) {
  var fechaStr = fechaServicioStr(svc);
  if (!fechaStr) return { error: { message: 'El servicio no tiene fecha.' } };
  var h = horaLocalHHMMSS(ahoraDate);
  var r = await upsertRegistroHorasEntrada(wid, fechaStr, h);
  return r;
}

async function registrarHorasPuestoFijoSalida(wid, svc, ahoraDate) {
  var fechaStr = fechaServicioStr(svc);
  if (!fechaStr) return { error: { message: 'El servicio no tiene fecha.' } };
  var h = horaLocalHHMMSS(ahoraDate);
  var r = await upsertRegistroHorasSalida(wid, fechaStr, h);
  return r;
}

function toastPatchSinFilas(ctx) {
  toast('❌ No se guardó en Supabase (0 filas). Revisa que exista el servicio y que worker_id sea el de tu sesión. ' + (ctx || ''));
}

/** Misma fila aunque id venga como string o number desde onclick / PostgREST. */
function encontrarServicioLocal(id) {
  return allServicios.find(function (s) { return s.id == id || String(s.id) === String(id); });
}

/** Formato HH:MM desde columnas time / end_time (Postgres time o string). */
function fmtHoraProg(val) {
  if (val == null || val === '') return '';
  var t = String(val).trim();
  var m = t.match(/^(\d{1,2}):(\d{2})(?::\d{2})?/);
  if (m) return String(parseInt(m[1], 10)).padStart(2, '0') + ':' + String(parseInt(m[2], 10)).padStart(2, '0');
  return t;
}

function normalizarServicio(s) {
  const t = (s.time || '09:00').trim();
  const timePart = t.length === 5 ? t + ':00' : (t.length >= 8 ? t : t + ':00');
  const d = s.date;
  const fecha_hora = d ? `${d}T${timePart}` : null;
  var cli = s.clientes;
  if (Array.isArray(cli)) cli = cli.length ? cli[0] : null;
  if (cli && typeof cli !== 'object') cli = null;
  var nombre_cliente = '';
  if (cli && cli.name) nombre_cliente = String(cli.name).trim();
  else if (cli && cli.nombre) nombre_cliente = String(cli.nombre).trim();
  if (!nombre_cliente && s.nombre_cliente) nombre_cliente = String(s.nombre_cliente).trim();
  if (!nombre_cliente && s.cliente_nombre) nombre_cliente = String(s.cliente_nombre).trim();
  var cliente_phone = (cli && cli.phone) ? String(cli.phone).trim() : '';
  var cliente_email = (cli && cli.email) ? String(cli.email).trim() : '';
  var cliente_type = (cli && cli.type) ? String(cli.type).trim() : '';
  var cliente_estado = (cli && cli.estado) ? String(cli.estado).trim() : '';
  var cliente_nit = (cli && cli.nit) ? String(cli.nit).trim() : '';
  var cliente_segment = (cli && cli.segment) ? String(cli.segment).trim() : '';
  const plan_display = s.plan_contratado_id ? ('Plan #' + s.plan_contratado_id) : '';
  const confirmada_portal = s[C_STATUS] === 'Confirmado';
  const hora_prog_inicio = fmtHoraProg(s.time);
  const hora_prog_fin = fmtHoraProg(s.end_time);
  return {
    ...s,
    fecha_hora,
    nombre_cliente,
    cliente_phone,
    cliente_email,
    cliente_type,
    cliente_estado,
    cliente_nit,
    cliente_segment,
    plan_display,
    confirmada_portal,
    hora_prog_inicio,
    hora_prog_fin,
  };
}

function conTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise(function (_, rej) {
      setTimeout(function () { rej(new Error('timeout')); }, ms);
    })
  ]);
}

async function primeraCargaAuth(session) {
  if (arranqueAuthResuelto) return;
  if (primCargaPromise) return await primCargaPromise;
  primCargaPromise = (async function () {
    setTopbarDate();
    try {
      if (session && session.user) {
        await initApp(session.user);
        if (!trabajadoraRow) showView('login');
      } else {
        showView('login');
      }
    } catch (err) {
      showView('login');
    } finally {
      arranqueAuthResuelto = true;
      primCargaPromise = null;
    }
  })();
  return await primCargaPromise;
}

/* ── SESIÓN: primer evento suele ser INITIAL_SESSION; en algunos entornos llega SIGNED_IN primero ── */
db.auth.onAuthStateChange(async function (event, session) {
  if (event === 'INITIAL_SESSION' || event === 'SIGNED_IN') {
    if (!arranqueAuthResuelto) {
      await primeraCargaAuth(session);
      return;
    }
    if (session && session.user) {
      const appActiva = document.getElementById('view-app') && document.getElementById('view-app').classList.contains('active');
      if (currentUser && currentUser.id === session.user.id && trabajadoraRow && appActiva) {
        aplicarNombreTopbar(session.user);
        return;
      }
      try {
        await initApp(session.user);
      } catch (err) {
        showView('login');
      }
    }
    return;
  }
  if (event === 'SIGNED_OUT') {
    arranqueAuthResuelto = false;
    currentUser = null;
    trabajadoraRow = null;
    allServicios = [];
    showView('login');
  }
});

setTimeout(async function () {
  if (arranqueAuthResuelto) return;
  try {
    const { data: { session } } = await db.auth.getSession();
    if (session) await primeraCargaAuth(session);
    else {
      showView('login');
      arranqueAuthResuelto = true;
    }
  } catch (err) {
    showView('login');
    arranqueAuthResuelto = true;
  }
}, 2000);

setTimeout(function () {

/* ─────────────────────────────────────────────────
   LOGIN / LOGOUT
───────────────────────────────────────────────── */
function resetLoginButton() {
  const btn = document.getElementById('btn-login');
  if (btn) { btn.innerHTML = 'Iniciar sesión'; btn.disabled = false; }
}

function aplicarNombreTopbar(user) {
  var el = document.getElementById('topbar-name');
  if (!el || !user) return;
  var raw = (trabajadoraRow && trabajadoraRow[C_TRAB_NOMBRE]) ? trabajadoraRow[C_TRAB_NOMBRE] : (user.email || '');
  el.textContent = '👋 Hola, ' + String(raw).split(' ')[0];
}

function mensajeErrorAuth(error) {
  if (!error) return 'No se pudo iniciar sesión.';
  const m = (error.message || '').toLowerCase();
  if (m.includes('email not confirmed') || m.includes('not confirmed'))
    return 'Confirma tu correo antes de entrar: abre el enlace del email de verificación, o en Supabase ve a Authentication → Providers → Email y desactiva «Confirm email» (solo para pruebas).';
  if (m.includes('invalid login') || m.includes('invalid credentials'))
    return 'Correo o contraseña incorrectos. Si acabas de crear el usuario, revisa que la contraseña sea la del panel y el correo idéntico (sin espacios).';
  if (m.includes('too many requests') || m.includes('rate limit'))
    return 'Demasiados intentos. Espera unos minutos e inténtalo de nuevo.';
  return error.message || 'No se pudo iniciar sesión.';
}

async function doLogin() {
  const emailRaw = document.getElementById('inp-email').value.trim();
  const email    = emailRaw.toLowerCase();
  const pass     = document.getElementById('inp-pass').value;
  const btn      = document.getElementById('btn-login');
  const errEl    = document.getElementById('login-error');
  errEl.classList.remove('show');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled  = true;
  try {
    const { error } = await db.auth.signInWithPassword({ email, password: pass });
    if (error) {
      errEl.textContent = mensajeErrorAuth(error);
      errEl.classList.add('show');
    }
  } finally {
    resetLoginButton();
  }
}

function doLogout() {
  cancelarInitCarga = true;
  limpiarWatchdogConectando();
  currentUser = null;
  trabajadoraRow = null;
  clienteBaseId = null;
  horasClienteBase = null;
  allServicios = [];
  showView('login');
  arranqueAuthResuelto = false;
  limpiarSesionLocalSupabase();
  setTimeout(function () {
    db.auth.signOut({ scope: 'local' }).catch(function () {});
    db.auth.signOut().catch(function () {});
  }, 0);
}

/* ─────────────────────────────────────────────────
   INIT
───────────────────────────────────────────────── */
async function initApp(user) {
  if (initAppPromise) return initAppPromise;
  initAppPromise = (async function () {
    try {
      await initAppBody(user);
    } finally {
      initAppPromise = null;
    }
  })();
  return initAppPromise;
}

async function initAppBody(user) {
  const appActiva = document.getElementById('view-app') && document.getElementById('view-app').classList.contains('active');
  if (currentUser && currentUser.id === user.id && trabajadoraRow && appActiva) {
    aplicarNombreTopbar(user);
    return;
  }
  cancelarInitCarga = false;
  limpiarWatchdogConectando();
  showView('app');
  currentUser = user;
  document.getElementById('topbar-name').textContent = 'Conectando…';
  conectandoWatchdog = setTimeout(function () {
    conectandoWatchdog = null;
    var el = document.getElementById('topbar-name');
    if (!el || el.textContent.indexOf('Conectando') === -1) return;
    cancelarInitCarga = true;
    limpiarWatchdogConectando();
    resetLoginButton();
    var errEl = document.getElementById('login-error');
    errEl.textContent = 'La carga no terminó. Inicia sesión de nuevo para cargar la información.';
    errEl.classList.add('show');
    currentUser = null;
    trabajadoraRow = null;
    clienteBaseId = null;
    horasClienteBase = null;
    allServicios = [];
    showView('login');
    arranqueAuthResuelto = false;
    limpiarSesionLocalSupabase();
    setTimeout(function () {
      db.auth.signOut({ scope: 'local' }).catch(function () {});
    }, 0);
  }, 12000);
  const emailBusca = (user.email || '').trim().toLowerCase();
  const emailAlt   = (user.email || '').trim();
  const tQuery = 6000;
  let rows;
  try {
    const r1 = await conTimeout(db.from(T_TRABAJADORAS).select('*').eq(C_TRAB_EMAIL, emailBusca).limit(1), tQuery);
    if (cancelarInitCarga) return;
    if (r1.error) throw r1.error;
    rows = r1.data;
    if (!rows || !rows.length) {
      const r2 = await conTimeout(db.from(T_TRABAJADORAS).select('*').eq(C_TRAB_EMAIL, emailAlt).limit(1), tQuery);
      if (cancelarInitCarga) return;
      if (r2.error) throw r2.error;
      rows = r2.data;
    }
  } catch (e) {
    if (cancelarInitCarga) return;
    limpiarWatchdogConectando();
    await db.auth.signOut();
    const errEl = document.getElementById('login-error');
    errEl.textContent = (e && e.message === 'timeout')
      ? 'Sin respuesta al cargar tu perfil. Revisa la conexión e inténtalo de nuevo.'
      : 'No se pudo cargar tu perfil. Revisa la conexión o contacta a coordinación.';
    errEl.classList.add('show');
    resetLoginButton();
    showView('login');
    return;
  }
  if (cancelarInitCarga) return;
  trabajadoraRow = rows && rows[0] ? rows[0] : null;
  if (!trabajadoraRow) {
    limpiarWatchdogConectando();
    await db.auth.signOut();
    const errEl = document.getElementById('login-error');
    errEl.textContent = 'Tu cuenta no está vinculada a una trabajadora. Contacta a coordinación.';
    errEl.classList.add('show');
    resetLoginButton();
    showView('login');
    return;
  }
  if (cancelarInitCarga) return;
  resetLoginButton();
  aplicarNombreTopbar(user);
  limpiarWatchdogConectando();
  try {
    await conTimeout(loadServicios(), 15000);
    if (cancelarInitCarga) return;
    renderSection();
  } catch (e) {
    if (cancelarInitCarga) return;
    allServicios = [];
    resetLoginButton();
    renderSection();
    if (e && e.message === 'timeout') {
      toast('Sin respuesta al cargar la agenda. Revisa la conexión y recarga.');
    } else {
      var det = (e && e.message) ? e.message : (e && e.code) ? String(e.code) : '';
      var hint = det ? (' Detalle: ' + det) : '';
      toast('No se pudieron cargar los servicios.' + hint + ' Revisa conexión, permisos en la tabla servicios y que existan filas con tu worker_id.');
    }
  }
}

/* ─────────────────────────────────────────────────
   CARGAR SERVICIOS
───────────────────────────────────────────────── */
function queryServiciosBase(trabId, desdeStr, hastaStr, columnasSelect) {
  var cols = columnasSelect || '*';
  var w = coercerIdServicio(trabId);
  return db
    .from(T_SERVICIOS)
    .select(cols)
    .eq(C_TRABAJADORA_ID, w)
    .gte('date', desdeStr)
    .lte('date', hastaStr)
    .order('date', { ascending: true })
    .order('time', { ascending: true });
}

async function loadServicios() {
  if (!trabajadoraRow) return;
  const trabId = workerIdSesion();
  if (trabId == null) return;
  try { await loadClienteBase(); } catch (e) {}
  const desde  = new Date(); desde.setDate(desde.getDate() - 2);
  const hasta  = new Date(); hasta.setDate(hasta.getDate() + 14);
  const desdeStr = desde.toISOString().split('T')[0];
  const hastaStr = hasta.toISOString().split('T')[0];
  let { data, error } = await queryServiciosBase(trabId, desdeStr, hastaStr, SELECT_SERVICIOS_CLIENTE);
  if (error)
    ({ data, error } = await queryServiciosBase(trabId, desdeStr, hastaStr, '*'));
  if (error) {
    allServicios = [];
    var errObj = error;
    if (typeof errObj === 'object' && errObj !== null && errObj.message) throw errObj;
    throw new Error(typeof errObj === 'string' ? errObj : 'load_servicios');
  }
  allServicios = (data || [])
    .map(normalizarServicio)
    .filter(function (s) { return s[C_TRABAJADORA_ID] == trabId; });
}

───────────────────────────────────────────────── */
function renderSection() {
  if (currentSection === 'agenda')  renderAgenda();
  if (currentSection === 'perfil')  renderPerfil();
  if (currentSection === 'modulos') renderModulos();
}

function renderAgenda() {
  const content  = document.getElementById('main-content');
  const filtered = aplicarReglaFijoBase(filterByTab(allServicios, currentTab));
  var fijoHint = '';
  if (esTrabajadoraFija() && clienteBaseId != null) {
    var hb = Number(horasClienteBase);
    if (hb === 40)
      fijoHint = '<div class="fijo-hint">Contrato fijo (40 h/semana): el cliente base solo se muestra de lunes a viernes.</div>';
    else if (hb === 44)
      fijoHint = '<div class="fijo-hint">Contrato fijo (44 h/semana): el cliente base se muestra de lunes a sábado.</div>';
  }
  if (!filtered.length) {
    content.innerHTML = fijoHint + `<div class="empty">
      <div class="empty-icon">📅</div>
      <div class="empty-text">No tienes servicios<br>programados para este período.</div>
    </div>`; return;
  }
  let banner = '';
  if (currentTab === 'manana') {
    const sinConfirmar = filtered.filter(s => !s[C_CONFIRMADA]);
    if (sinConfirmar.length)
      banner = `<div class="confirm-banner">
        <div class="confirm-banner-icon">🔔</div>
        <div class="confirm-banner-text">
          Tienes <strong>${sinConfirmar.length} servicio(s)</strong> sin confirmar para mañana. Presiona "Confirmar" en cada uno.
        </div>
      </div>`;
  }
  content.innerHTML = fijoHint + banner + filtered.map(s => renderSvcCard(s)).join('');
}

function filterByTab(servicios, tab) {
  const hoy     = new Date();
  const hoyStr  = hoy.toISOString().split('T')[0];
  const man     = new Date(hoy); man.setDate(hoy.getDate()+1);
  const manStr  = man.toISOString().split('T')[0];
  const en7     = new Date(hoy); en7.setDate(hoy.getDate()+7);
  return servicios.filter(s => {
    const ds = s.date; // YYYY-MM-DD en BD
    if (!ds) return false;
    if (tab === 'hoy')    return ds === hoyStr;
    if (tab === 'manana') return ds === manStr;
    if (tab === 'semana') {
      const d = new Date(s[C_FECHA]);
      return d >= d0Dia(hoy) && d <= finDia(en7);
    }
    return true;
  });
}
function d0Dia(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function finDia(d) { const x = new Date(d); x.setHours(23,59,59,999); return x; }

/** Texto secundario desde fila clientes (client_id → clientes). */
function lineaClienteCtx(s) {
  var p = [];
  if (s.cliente_type) p.push(s.cliente_type);
  if (s.cliente_segment) p.push(s.cliente_segment);
  if (s.cliente_phone) p.push('☎ ' + s.cliente_phone);
  if (s.cliente_email) p.push(s.cliente_email);
  if (s.cliente_estado) p.push(s.cliente_estado);
  return p.join(' · ');
}

function escapeHtml(str) {
  if (str == null || str === '') return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderSvcCard(s) {
  const dt     = new Date(s[C_FECHA]);
  const hora   = dt.toLocaleTimeString('es', { hour:'2-digit', minute:'2-digit' });
  const fecha  = dt.toLocaleDateString('es', { weekday:'long', day:'numeric', month:'long' });
  const nombre = (s[C_NOMBRE_CLI] && String(s[C_NOMBRE_CLI]).trim()) ? s[C_NOMBRE_CLI] : 'Sin nombre de cliente';
  const plan   = s[C_PLAN] || '';
  const dir    = s[C_DIRECCION] || 'Sin dirección';
  const progIni = s.hora_prog_inicio || '—';
  const progFin = s.hora_prog_fin || '—';
  const metaCli = lineaClienteCtx(s);
  const mapUrl = `https://maps.google.com/?q=${encodeURIComponent(dir)}`;
  const estado = getEstado(s);
  const { label, cls } = badgeInfo(estado);

  const tsEnt = s[C_REP_INICIO]
    ? `<div class="ts-chip"><div class="ts-label">Entrada</div><div class="ts-value">${fmtTime(s[C_REP_INICIO])}</div></div>`
    : `<div class="ts-chip"><div class="ts-label">Entrada</div><div class="ts-value" style="color:var(--muted)">—</div></div>`;
  const tsSal = s[C_REP_FIN]
    ? `<div class="ts-chip"><div class="ts-label">Salida</div><div class="ts-value">${fmtTime(s[C_REP_FIN])}</div></div>`
    : `<div class="ts-chip"><div class="ts-label">Salida</div><div class="ts-value" style="color:var(--muted)">—</div></div>`;

  let acciones = '';
  if (estado === 'pendiente')
    acciones = `<button class="btn btn-ghost" onclick="confirmarServicio('${s.id}')">✓ Confirmar</button>
                <button class="btn btn-primary" onclick="abrirServicio('${s.id}')">Ver detalle →</button>`;
  else if (estado === 'confirmado')
    acciones = `<button class="btn btn-green" onclick="registrarEntrada('${s.id}')">📍 Registrar entrada</button>
                <button class="btn btn-ghost" onclick="abrirServicio('${s.id}')">Ver</button>`;
  else if (estado === 'iniciado')
    acciones = `<button class="btn btn-red" onclick="registrarSalida('${s.id}')">🏁 Registrar salida</button>
                <button class="btn btn-ghost" onclick="abrirServicio('${s.id}')">Ver</button>`;
  else
    acciones = `<button class="btn btn-ghost btn-full" onclick="abrirServicio('${s.id}')">Ver resumen</button>`;

  return `<div class="card" id="card-${s.id}">
    <div class="svc-header">
      <div><div class="svc-time">${hora}</div><div class="svc-date">${capitalize(fecha)}</div></div>
      <div class="badge ${cls}">${label}</div>
    </div>
    <div class="svc-client">${nombre}</div>
    ${metaCli ? `<div class="svc-cliente-meta">${escapeHtml(metaCli)}</div>` : ''}
    <div class="svc-prog">Inicio programado: ${progIni} · Fin programado: ${progFin}</div>
    <div class="svc-plan">${plan}</div>
    <a class="svc-addr" href="${mapUrl}" target="_blank">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
        <circle cx="12" cy="9" r="2.5"/>
      </svg>
      <span>${dir}</span>
      <span class="maps-label">Maps →</span>
    </a>
    <div class="timestamps">${tsEnt}${tsSal}</div>
    <div class="svc-actions">${acciones}</div>
  </div>`;
}

function getEstado(s) {
  if (s[C_REP_FIN] || s[C_STATUS] === 'Finalizado' || s[C_STATUS] === 'Completado') return 'completado';
  if (s[C_REP_INICIO] || s[C_STATUS] === 'Iniciado') return 'iniciado';
  if (s[C_STATUS] === 'Confirmado' || s[C_CONFIRMADA]) return 'confirmado';
  return 'pendiente';
}
function badgeInfo(estado) {
  return {
    pendiente:  { label:'Pendiente',  cls:'badge-pending'  },
    confirmado: { label:'Confirmado', cls:'badge-confirmed'},
    iniciado:   { label:'Iniciado',    cls:'badge-ongoing'  },
    completado: { label:'Finalizado', cls:'badge-done'     },
  }[estado] || { label: estado, cls:'' };
}

/* ─────────────────────────────────────────────────
   ACCIONES
───────────────────────────────────────────────── */
async function confirmarServicio(id) {
  const wid = workerIdSesion();
  if (wid == null) return;
  const payload = { [C_STATUS]: 'Confirmado' };
  const { data, error } = await serviciosPatchOwn(wid, id, payload);
  if (error) { toast('❌ ' + (error.message || 'Error al confirmar')); return; }
  if (data && data.length) {
    toast('✅ Servicio confirmado');
    mergeServicioDesdeSupabase(id, data[0]);
    renderAgenda();
    return;
  }
  try { await loadServicios(); } catch (e) {}
  var s = encontrarServicioLocal(id);
  var ok = s && s[C_STATUS] === 'Confirmado';
  if (ok) {
    toast('✅ Servicio confirmado');
    renderAgenda();
  } else {
    toastPatchSinFilas('Confirmar');
  }
}

async function registrarEntrada(id) {
  getGPS(async (lat, lon, err) => {
    if (err) { toast('📍 Activa el GPS para registrar entrada'); return; }
    const svc = encontrarServicioLocal(id);
    if (!svc) { toast('No se encontró el servicio. Recarga la agenda.'); return; }
    const valido = await validarUbicacion(lat, lon, svc[C_DIRECCION]);
    if (!valido.ok) { showGPSModal('entrada', id, lat, lon, valido.distancia); return; }
    await guardarEntrada(id, lat, lon);
  });
}
async function guardarEntrada(id, lat, lon) {
  const wid = workerIdSesion();
  if (wid == null) return;
  const svc = encontrarServicioLocal(id);
  const ahoraDate = new Date();
  if (esPuestoFijo() && svc) {
    const rh = await registrarHorasPuestoFijoEntrada(wid, svc, ahoraDate);
    if (rh.error) { toast('❌ ' + (rh.error.message || 'No se pudo guardar en registro_horas')); return; }
  }
  const ahora = ahoraDate.toISOString();
  const upd = { [C_REP_INICIO]: ahora, [C_STATUS]: 'Iniciado' };
  const { data, error } = await serviciosPatchOwn(wid, id, upd);
  if (error) { toast('❌ ' + (error.message || 'Entrada')); return; }
  if (data && data.length) {
    toast('⏱️ Entrada registrada');
    mergeServicioDesdeSupabase(id, data[0]);
    renderAgenda();
    return;
  }
  try { await loadServicios(); } catch (e) {}
  var s = encontrarServicioLocal(id);
  if (s && s[C_REP_INICIO]) {
    toast('⏱️ Entrada registrada');
    renderAgenda();
  } else {
    toastPatchSinFilas('Entrada GPS');
  }
}
async function registrarSalida(id) {
  getGPS(async (lat, lon, err) => {
    if (err) { toast('📍 Activa el GPS para registrar salida'); return; }
    const svc = encontrarServicioLocal(id);
    if (!svc) { toast('No se encontró el servicio. Recarga la agenda.'); return; }
    const valido = await validarUbicacion(lat, lon, svc[C_DIRECCION]);
    if (!valido.ok) { showGPSModal('salida', id, lat, lon, valido.distancia); return; }
    const wid = workerIdSesion();
    if (wid == null) return;
    const ahoraDate = new Date();
    if (esPuestoFijo() && svc) {
      const rh = await registrarHorasPuestoFijoSalida(wid, svc, ahoraDate);
      if (rh.error) { toast('❌ ' + (rh.error.message || 'No se pudo guardar en registro_horas')); return; }
    }
    const ahora = ahoraDate.toISOString();
    const upd = { [C_REP_FIN]: ahora, [C_STATUS]: 'Finalizado' };
    const { data, error } = await serviciosPatchOwn(wid, id, upd);
    if (error) { toast('❌ ' + (error.message || 'Salida')); return; }
    if (data && data.length) {
      toast('🏁 Salida registrada');
      mergeServicioDesdeSupabase(id, data[0]);
      renderAgenda();
      return;
    }
    try { await loadServicios(); } catch (e) {}
    var s = encontrarServicioLocal(id);
    if (s && s[C_REP_FIN]) {
      toast('🏁 Salida registrada');
      renderAgenda();
    } else {
      toastPatchSinFilas('Salida GPS');
    }
  });
}

function abrirServicio(id) {
  const s = encontrarServicioLocal(id);
  if (!s) { toast('Servicio no disponible. Recarga la agenda.'); return; }
  const dt     = new Date(s[C_FECHA]);
  const dir    = s[C_DIRECCION] || 'Sin dirección';
  const mapUrl = `https://maps.google.com/?q=${encodeURIComponent(dir)}`;
  const estado = getEstado(s);
  const { label, cls } = badgeInfo(estado);
  document.getElementById('modal-title').textContent = (s[C_NOMBRE_CLI] && String(s[C_NOMBRE_CLI]).trim()) ? s[C_NOMBRE_CLI] : 'Servicio';
  document.getElementById('modal-sub').textContent =
    capitalize(dt.toLocaleDateString('es',{weekday:'long',day:'numeric',month:'long'})) +
    ' — ' + dt.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
  const metaCliModal = lineaClienteCtx(s);
  const idPart = s[C_CLIENT_ID] != null ? 'Cliente #' + escapeHtml(String(s[C_CLIENT_ID])) : '';
  const nitPart = s.cliente_nit ? (idPart ? ' · ' : '') + 'NIT ' + escapeHtml(s.cliente_nit) : '';
  const idNitHtml = (idPart || nitPart)

async function forzarSalida(id, lat, lon) {
  const wid = workerIdSesion();
  if (wid == null) return;
  const svc = encontrarServicioLocal(id);
  const ahoraDate = new Date();
  if (esPuestoFijo() && svc) {
    const rh = await registrarHorasPuestoFijoSalida(wid, svc, ahoraDate);
    if (rh.error) { toast('❌ ' + (rh.error.message || 'No se pudo guardar en registro_horas')); return; }
  }
  const ahora = ahoraDate.toISOString();
  const upd = { [C_REP_FIN]: ahora, [C_STATUS]: 'Finalizado' };
  const { data, error } = await serviciosPatchOwn(wid, id, upd);
  if (error) { toast('❌ ' + (error.message || 'Salida')); return; }
  if (data && data.length) {
    mergeServicioDesdeSupabase(id, data[0]);
    toast('🏁 Salida registrada');
    renderAgenda();
    return;
  }
  try { await loadServicios(); } catch (e) {}
  var s = encontrarServicioLocal(id);
  if (s && s[C_REP_FIN]) {
    toast('🏁 Salida registrada');
    renderAgenda();
  } else {
    toastPatchSinFilas('Salida forzada');
  }
}

/* ─────────────────────────────────────────────────
   GPS
───────────────────────────────────────────────── */
function getGPS(cb) {
  if (!navigator.geolocation) { cb(null,null,'no_gps'); return; }
  navigator.geolocation.getCurrentPosition(
    pos => cb(pos.coords.latitude, pos.coords.longitude, null),
    err => cb(null, null, err.message),
    { enableHighAccuracy: true, timeout: 10000 }
  );
}
async function validarUbicacion(lat, lon, direccion) {
  try {
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(direccion)}&limit=1`;
    const arr = await (await fetch(url,{headers:{'Accept-Language':'es'}})).json();
    if (!arr.length) return { ok: true, distancia: 0 };
    const dist = haversine(lat, lon, parseFloat(arr[0].lat), parseFloat(arr[0].lon));
    return { ok: dist <= GPS_RADIO_M, distancia: dist };
  } catch { return { ok: true, distancia: 0 }; }
}
function haversine(lat1,lon1,lat2,lon2) {
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

  const d = new Date(iso);
  return d.toLocaleString('es',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

function updateLocal(id, fields) {
  const i = allServicios.findIndex(function (s) { return s.id == id || String(s.id) === String(id); });
  if (i > -1) allServicios[i] = { ...allServicios[i], ...fields };
}

/** Sincroniza la tarjeta local con la fila que devuelve PostgREST tras el PATCH (status Iniciado/Finalizado/Confirmado, timestamptz). */
function mergeServicioDesdeSupabase(id, row) {
  if (!row) return;
  var i = allServicios.findIndex(function (s) { return s.id == id || String(s.id) === String(id); });
  if (i < 0) return;
  var prev = allServicios[i];
  var merged = Object.assign({}, prev, row);
  allServicios[i] = normalizarServicio(merged);
}

/* ─────────────────────────────────────────────────
   PWA SERVICE WORKER (solo http/https; file:// rompe CORS y el SW)
───────────────────────────────────────────────── */
if ('serviceWorker' in navigator && (location.protocol === 'http:' || location.protocol === 'https:')) {
  const swCode = `const C='limman-v1';
  self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['./','./trabajadora-portal.html']))));
  self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  const blob = new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(function(){});
}
